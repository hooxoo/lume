# Auto-generated from palette.json — do not edit manually
# Run `bun run generate` to regenerate
#
# Lume — tmux theme
# https://github.com/danfry1/lume

set -ga terminal-overrides ",*:RGB"

set -g status-style "bg=#0e0c18,fg=#b0a8c4"
set -g status-left-length 40
set -g status-right-length 40
set -g status-left "#{?client_prefix,#[fg=#0a0814#,bg=#d0a0b8#,bold] PREFIX ,#[fg=#0a0814,bg=#b8a0e0,bold] #{session_name} }#[fg=default,bg=#0e0c18,nobold] "
set -g status-right "#[fg=#8a8498] %H:%M #[fg=#8a8498]│ #[fg=#8a8498]#{host_short} "

set -g window-status-format "#[fg=#8a8498,bg=#0e0c18] #{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=#d8d0e4,bg=#1e1a2c,bold] #{window_index}:#{window_name} "
set -g window-status-separator ""

set -g pane-border-style "fg=#262236"
set -g pane-active-border-style "fg=#b8a0e0"

set -g mode-style "fg=#0a0814,bg=#b8a0e0"

set -g message-style "fg=#d8d0e4,bg=#1e1a2c"
set -g message-command-style "fg=#d8d0e4,bg=#1e1a2c"

set -g clock-mode-colour "#b8a0e0"

set -g copy-mode-match-style "fg=#0a0814,bg=#c4b080"
set -g copy-mode-current-match-style "fg=#0a0814,bg=#e8b4a0"
